---
# yaml-language-server: $schema=../../../schemas/mcp-servers.schema.json
#
# Profile-private overlay (rendered only when private == false).
# All targets are opt-in; see 00-base.yaml for full target list.
mcp:
  serversById:

    # Atlassian — exposed via mcpproxy.
    atlassian:
      enabled: true
      conditions:
        private: false
      targets:
        mcpproxy:
          enabled: true
      remote:
        url: "https://mcp.atlassian.com/v1/mcp"

    mcp-atlassian:
      enabled: true
      conditions:
        private: false
      targets:
        mcpproxy:
          enabled: true
      local:
        command: "bash"
        args:
          - "-c"
          - "set -a; source ~/.config/opencode/mcp-atlassian.env; set +a; exec mise x python -- uvx mcp-atlassian==0.21.1"
        env: {}
