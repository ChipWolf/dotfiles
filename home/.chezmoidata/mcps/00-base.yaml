---
# yaml-language-server: $schema=../../../schemas/mcp-servers.schema.json
#
# All targets are opt-in. Each server must list every target it should
# render to under `targets.<target>.enabled: true`. Targets not listed
# render to nothing for that server.
#
# Targets:
#   cursor    -> ~/.cursor/mcp.json
#   opencode  -> ~/.config/opencode/opencode.jsonc (mcp block)
#   mcpproxy  -> ~/.mcpproxy/mcp_config.json (smart-mcp-proxy upstreams)
#   pi        -> ~/.pi/agent/mcp.json
mcp:
  serversById:

    # --- Upstream servers --------------------------------------------
    # These render into mcpproxy (for cursor/opencode, which benefit
    # from retrieve_tools-style discovery) and directly into pi (which
    # already has pi-mcp-adapter providing its own lazy mcp() proxy;
    # stacking another tool-discovery layer on top adds friction
    # without saving context).

    obsidian:
      enabled: true
      targets:
        mcpproxy:
          enabled: true
        pi:
          enabled: true
      local:
        command: "mise"
        args:
          - "x"
          - "node@22"
          - "--"
          - "npx"
          - "-y"
          - "@mauricio.wolff/mcp-obsidian@0.8.2"
          - "$data.obsidianVaultPath"
        env: {}

    chrome-devtools:
      enabled: true
      targets:
        mcpproxy:
          enabled: true
        pi:
          enabled: true
      local:
        command: "mise"
        args:
          - "x"
          - "node@22"
          - "--"
          - "npx"
          - "-y"
          - "chrome-devtools-mcp@0.24.0"
        env: {}

    context7:
      enabled: true
      targets:
        mcpproxy:
          enabled: true
        pi:
          enabled: true
      remote:
        url: "https://mcp.context7.com/mcp"

    grep:
      enabled: true
      targets:
        mcpproxy:
          enabled: true
        pi:
          enabled: true
      remote:
        url: "https://mcp.grep.app"

    # --- Client-side servers -----------------------------------------
    # context-mode is wired DIRECTLY into hook-capable clients
    # (cursor, opencode) so the client-side hooks/plugin can intercept
    # native tool calls (Shell/Read/Grep/curl) and redirect them to
    # the ctx_execute sandbox. Routing through mcpproxy would bypass
    # those hooks since they live in the client, not in MCP transport.

    context-mode:
      enabled: true
      targets:
        cursor:
          enabled: true
        opencode:
          enabled: true
        pi:
          enabled: true
      local:
        command: "context-mode"
        args: []
        env: {}

    # --- Aggregator entry --------------------------------------------
    # Smart MCP proxy aggregates the upstream MCP servers above and
    # exposes them via retrieve_tools-style discovery. Used by cursor
    # (40-tool limit) and opencode (token cost per registered tool).
    # Pi connects to upstream servers directly (see above) since
    # pi-mcp-adapter already provides lazy/discovery semantics.
    # mcpproxy.app or the brew-installed mcpproxy CLI must be running.

    mcpproxy:
      enabled: true
      targets:
        cursor:
          enabled: true
        opencode:
          enabled: true
      remote:
        url: "http://127.0.0.1:8080/mcp"
        transport: "streamableHttp"
