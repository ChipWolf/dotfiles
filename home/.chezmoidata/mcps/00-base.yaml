---
# yaml-language-server: $schema=../../../schemas/mcp-servers.schema.json
mcp:
  serversById:
    obsidian:
      enabled: true
      local:
        command: "mise"
        args:
          - "x"
          - "node@22"
          - "--"
          - "npx"
          - "-y"
          - "@mauricio.wolff/mcp-obsidian@0.8.2"
          - "$data.obsidianVaultPath"
        env: {}

    chrome-devtools:
      enabled: true
      local:
        command: "mise"
        args:
          - "x"
          - "node@22"
          - "--"
          - "npx"
          - "-y"
          - "chrome-devtools-mcp@0.24.0"
        env: {}

    context7:
      enabled: true
      remote:
        url: "https://mcp.context7.com/mcp"

    grep:
      enabled: true
      remote:
        url: "https://mcp.grep.app"

    context-mode:
      enabled: true
      # Context-mode is a context-saving proxy; only expose to pi.
      targets:
        cursor:
          enabled: false
        opencode:
          enabled: false
        mcpproxy:
          enabled: false
        pi:
          enabled: true
      local:
        command: "context-mode"
        args: []
        env: {}
